server:
  port: 8082

spring:
  application:
    name: room-service
  datasource:
    url: jdbc:mysql://localhost:3306/room_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:hotel_user}
    password: ${DB_PASSWORD:hotel_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api/catalog/v3/api-docs
  swagger-ui:
    path: /api/catalog/swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
